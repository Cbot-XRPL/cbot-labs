<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>XRPL Strategy Bot - Owner Dashboard</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>XRPL Strategy Bot (Owner-only)</h1>
      <div class="note">This dashboard is owner-only. Set header <code>x-owner-wallet</code> to one of OWNER_WALLETS.</div>
      <div id="status" class="card">Loading status...</div>
      <div id="metrics" class="card">Loading metrics...</div>
      <div id="trades" class="card">Loading trades...</div>
      <div class="controls">
        <button id="trigger">Run One Tick</button>
        <label>Owner Wallet (x-owner-wallet): <input id="owner" placeholder="rVeHp..." /></label>
      </div>
    </div>
    <script src="/client.js"></script>
  </body>
</html>
